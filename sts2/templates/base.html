<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Spirescope — Slay the Spire 2 companion dashboard. Browse cards, relics, enemies, track live runs, and analyze decks.">
  <meta name="theme-color" content="#0d1117">
  <meta property="og:title" content="{% block og_title %}Spirescope{% endblock %}">
  <meta property="og:description" content="Slay the Spire 2 companion — cards, relics, enemies, live run tracking, and deck analysis.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔭</text></svg>">
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <title>{% block title %}Spirescope{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css?v={{ css_hash }}">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <nav aria-label="Main navigation">
    {% set p = request.url.path %}
    <a class="logo" href="/">Spirescope</a>
    <a href="/cards" {% if p.startswith('/cards') %}style="color:var(--text)"{% endif %}>Cards</a>
    <a href="/relics" {% if p.startswith('/relics') %}style="color:var(--text)"{% endif %}>Relics</a>
    <a href="/potions" {% if p == '/potions' %}style="color:var(--text)"{% endif %}>Potions</a>
    <a href="/enemies" {% if p.startswith('/enemies') %}style="color:var(--text)"{% endif %}>Enemies</a>
    <a href="/events" {% if p == '/events' %}style="color:var(--text)"{% endif %}>Events</a>
    <a href="/deck" {% if p.startswith('/deck') %}style="color:var(--text)"{% endif %}>Deck Analyzer</a>
    <a href="/live" style="color:{% if p == '/live' %}#fff{% else %}var(--green){% endif %}">Live Run</a>
    <a href="/runs" {% if p.startswith('/runs') %}style="color:var(--text)"{% endif %}>Run History</a>
    <a href="/analytics" {% if p == '/analytics' %}style="color:var(--text)"{% endif %}>Analytics</a>
    <a href="/community" {% if p == '/community' %}style="color:var(--text)"{% endif %}>Community</a>
    <form class="search-form" action="/search" method="get">
      <input type="search" name="q" placeholder="Search cards, relics, enemies..." value="{{ query|default('') }}" maxlength="200">
      <button type="submit">Search</button>
    </form>
  </nav>
  <main id="main" class="container">
    {% block content %}{% endblock %}
  </main>
  <footer>
    <span>Spirescope v1.0</span> &middot;
    <a href="https://github.com/thequantumfalcon/Spirescope">GitHub</a>
  </footer>
</body>
</html>
