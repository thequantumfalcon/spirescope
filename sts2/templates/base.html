<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Spirescope — Slay the Spire 2 companion dashboard. Browse cards, relics, enemies, track live runs, and analyze decks.">
  <meta name="theme-color" content="#0d1117">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔭</text></svg>">
  <title>{% block title %}Spirescope{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <a class="logo" href="/">Spirescope</a>
    <a href="/cards">Cards</a>
    <a href="/relics">Relics</a>
    <a href="/potions">Potions</a>
    <a href="/enemies">Enemies</a>
    <a href="/events">Events</a>
    <a href="/deck">Deck Analyzer</a>
    <a href="/live" style="color:var(--green)">Live Run</a>
    <a href="/runs">Run History</a>
    <form class="search-form" action="/search" method="get">
      <input type="search" name="q" placeholder="Search cards, relics, enemies..." value="{{ query|default('') }}">
      <button type="submit">Search</button>
    </form>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
