name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check sts2/ tests/

      - name: Run tests
        id: tests
        run: |
          output=$(pytest -q --tb=short 2>&1) || true
          echo "$output"
          passed=$(echo "$output" | grep -oP '\d+(?= passed)' | tail -1)
          failed=$(echo "$output" | grep -oP '\d+(?= failed)' | tail -1)
          echo "passed=${passed:-0}" >> "$GITHUB_OUTPUT"
          echo "failed=${failed:-0}" >> "$GITHUB_OUTPUT"
          if [ "${failed:-0}" != "0" ] && [ -n "$failed" ]; then
            exit 1
          fi
          if [ -z "$passed" ]; then
            exit 1
          fi

      - name: Generate badge
        if: matrix.python-version == '3.12' && github.ref == 'refs/heads/master'
        run: |
          passed=${{ steps.tests.outputs.passed }}
          failed=${{ steps.tests.outputs.failed }}
          if [ "$failed" != "0" ] && [ -n "$failed" ]; then
            color="red"
            message="${passed} passing, ${failed} failing"
          else
            color="brightgreen"
            message="${passed} passing"
          fi
          mkdir -p badges
          echo "{\"schemaVersion\":1,\"label\":\"tests\",\"message\":\"${message}\",\"color\":\"${color}\"}" > badges/tests.json

      - name: Publish badge
        if: matrix.python-version == '3.12' && github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badges
          publish_branch: badges
          destination_dir: .
          keep_files: true
          commit_message: "Update test badge"
