[project]
name = "sts2-assistant"
version = "1.0.0"
description = "A local web dashboard for Slay the Spire 2 — card/relic/enemy lookup, deck analysis, run history, and strategy guides."
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.100.0",
    "uvicorn[standard]>=0.20.0",
    "jinja2>=3.1.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "httpx>=0.24.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[tool.setuptools.packages.find]
include = ["sts2*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
